<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<title>Crayola Audio Engine</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#121212;
    color:white;
    margin:0;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:600px;
    background:#1e1e1e;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
    margin-top:0;
}

p{
    color:#ccc;
}

textarea{
    width:100%;
    height:80px;
    margin-top:10px;
    padding:10px;
    font-family:monospace;
    font-size:14px;
    border-radius:5px;
    border:none;
}

button{
    margin-top:15px;
    padding:10px 18px;
    font-size:15px;
    background:#6a5acd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#5947c4;
}

.example{
    background:#2b2b2b;
    padding:10px;
    border-radius:5px;
    font-family:monospace;
}

</style>
</head>

<body>

<div class="container">

<h1>🎵 Browser Live Coding Engine</h1>

<p>
Enter a pattern using the format:
</p>

<div class="example">
length@pitch length@pitch
</div>

<p>Example:</p>

<div class="example">
1+1@220 2@220*2 1*3@270
</div>

<p>
Repetition syntax:
</p>

<div class="example">
3@340 2[1@220 2@330]
</div>

<textarea id="code">1@220 1@330 1@440</textarea>

<button>Re-evaluate Pattern</button>

</div>

<script src="main.js"></script>

</body>
</html>
